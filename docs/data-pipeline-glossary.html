<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Pipeline Glossary</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; min-height: 100vh; }
#sidebar { width: 260px; flex-shrink: 0; border-right: 1px solid #334155; padding: 24px 0; overflow-y: auto; }
.sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid #334155; }
.sidebar-header h1 { font-size: 17px; font-weight: 700; }
.sidebar-header p { font-size: 12px; color: #64748b; margin-top: 4px; }
.cat-label { padding: 0 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #64748b; margin: 16px 0 6px; }
.nav-btn { display: block; width: 100%; text-align: left; border: none; cursor: pointer; background: transparent; border-left: 3px solid transparent; padding: 8px 20px; font-family: inherit; font-size: 13px; color: #94a3b8; transition: all 0.15s; }
.nav-btn:hover { background: rgba(99,102,241,0.06); }
.nav-btn.active { background: rgba(99,102,241,0.09); border-left-color: #6366f1; color: #818cf8; font-weight: 600; }
.sidebar-footer { padding: 20px; margin-top: 20px; border-top: 1px solid #334155; font-size: 11px; color: #64748b; line-height: 1.5; }
.pipeline-progress { padding: 16px 20px; border-bottom: 1px solid #334155; }
.pip-step { display: flex; align-items: center; gap: 10px; padding: 4px 0; font-size: 12px; color: #64748b; }
.pip-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #334155; flex-shrink: 0; }
.pip-line { width: 2px; height: 12px; background: #334155; margin-left: 4px; }
#main { flex: 1; padding: 32px 40px; max-width: 740px; overflow-y: auto; }
.pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 99px; background: rgba(99,102,241,0.13); color: #6366f1; border: 1px solid rgba(99,102,241,0.27); }
#entry-title { font-size: 24px; font-weight: 700; margin: 8px 0 4px; }
#entry-question { font-size: 15px; color: #818cf8; font-style: italic; margin-bottom: 24px; }
.etext { font-size: 14px; line-height: 1.65; margin-bottom: 14px; }
.analogy-box, .why-box, .detail-box { border-radius: 10px; padding: 14px 18px; margin-top: 14px; }
.analogy-box { background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.2); }
.why-box { background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.2); margin-top: 16px; }
.detail-box { background: rgba(251,146,60,0.07); border: 1px solid rgba(251,146,60,0.2); margin-top: 14px; }
.box-label { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
.analogy-box .box-label { color: #34d399; }
.why-box .box-label { color: #818cf8; }
.detail-box .box-label { color: #fb923c; }
.box-body { font-size: 13px; line-height: 1.6; }
.stats-row { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
.stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 100px; }
.stat-val { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.cap { font-size: 12px; color: #64748b; margin-bottom: 8px; }
.subcap { font-size: 11px; color: #64748b; margin-top: 6px; }
.flow-wrap { margin: 20px 0; }
.flow-wrap svg { width: 100%; display: block; }
table.tt { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 14px; }
table.tt th { padding: 6px 10px; text-align: left; color: #64748b; font-weight: 500; border-bottom: 1px solid #334155; }
table.tt td { padding: 6px 10px; }
table.tt tr:nth-child(even) td { background: #111827; }
code { background: #1e293b; padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: "SF Mono", Monaco, Consolas, monospace; }
.source-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
.source-card { background: #1e293b; border: 2px solid #334155; border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
.source-card:hover { border-color: #475569; }
.source-card.active { border-color: #6366f1; background: rgba(99,102,241,0.08); }
.source-icon { font-size: 22px; margin-bottom: 6px; }
.source-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.source-desc { font-size: 11px; color: #94a3b8; line-height: 1.4; }
.source-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.source-meta span { font-size: 10px; padding: 2px 8px; border-radius: 6px; background: rgba(99,102,241,0.1); color: #94a3b8; }
.source-detail { background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 18px; margin-top: 12px; display: none; }
.source-detail.visible { display: block; }
.detail-header { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.detail-section { margin-top: 14px; }
.detail-section h4 { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.sample-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.sample-table th { padding: 5px 8px; text-align: left; color: #64748b; font-weight: 600; border-bottom: 1px solid #334155; background: #0f172a; }
.sample-table td { padding: 5px 8px; border-bottom: 1px solid #1e293b; font-family: "SF Mono", Monaco, Consolas, monospace; }
.sample-wrap { max-height: 180px; overflow-y: auto; border-radius: 8px; border: 1px solid #334155; }
/* Cleaning-specific */
.step-card { background: #1e293b; border: 2px solid #334155; border-radius: 10px; padding: 16px; margin-top: 12px; cursor: pointer; transition: all 0.15s; }
.step-card:hover { border-color: #475569; }
.step-card.open { border-color: #6366f1; }
.step-num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 12px; font-weight: 700; margin-right: 8px; flex-shrink: 0; }
.step-title { font-size: 14px; font-weight: 700; }
.step-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.step-detail { margin-top: 12px; display: none; font-size: 13px; line-height: 1.6; }
.step-card.open .step-detail { display: block; }
.before-after { display: grid; grid-template-columns: 1fr 30px 1fr; gap: 8px; align-items: start; margin: 14px 0; }
.ba-col { background: #111827; border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 12px; }
.ba-col h5 { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
.ba-arrow { display: flex; align-items: center; justify-content: center; color: #6366f1; font-size: 18px; padding-top: 24px; }
.funnel-row { margin: 4px 0; display: flex; align-items: center; gap: 10px; }
.funnel-bar { height: 26px; border-radius: 5px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: 600; color: #0f172a; min-width: 40px; }
.funnel-label { font-size: 12px; color: #94a3b8; min-width: 160px; }
.placeholder { text-align: center; padding: 60px 20px; color: #475569; }
.placeholder-icon { font-size: 48px; margin-bottom: 12px; }
.placeholder-text { font-size: 15px; line-height: 1.6; }
</style>
</head>
<body>
<nav id="sidebar">
  <div class="sidebar-header"><h1>Data Pipeline</h1><p id="count-label"></p></div>
  <div id="pipeline-viz"></div>
  <div id="nav-list"></div>
  <div class="sidebar-footer"><strong style="color:#94a3b8">Interactive reference</strong><br>Click any stage to explore how data flows from raw sources to production predictions.</div>
</nav>
<main id="main">
  <div id="ep"></div><h2 id="entry-title"></h2><p id="entry-question"></p><div id="ec"></div>
</main>
<script>
const C={accent:"#6366f1",accentLt:"#818cf8",green:"#34d399",orange:"#fb923c",pink:"#f472b6",cyan:"#22d3ee",yellow:"#facc15",red:"#f87171",border:"#334155",surface:"#1e293b",dim:"#64748b",muted:"#94a3b8",bg:"#0f172a",text:"#e2e8f0"};
function analogyHTML(t){return`<div class="analogy-box"><div class="box-label">Plain-language analogy</div><div class="box-body">${t}</div></div>`;}
function whyHTML(t,title){return`<div class="why-box"><div class="box-label">${title||"How this works in our pipeline"}</div><div class="box-body">${t}</div></div>`;}
function detailHTML(t,title){return`<div class="detail-box"><div class="box-label">${title||"Key detail"}</div><div class="box-body">${t}</div></div>`;}

/* ================================================================
 *  ENTRY: Data Collection
 * ================================================================ */
const DATA_SOURCES = [
  { id:"sites_base", icon:"\u26fd", name:"Sites \u2013 Base Data Set", desc:"Site attributes, capabilities, ad eligibility, demographics", source:"Salesforce", format:"CSV", rows:"67,650", cols:43, color:C.accent,
    fields:["ID - Gbase","Avg Daily Impressions","Avg Household Income","Median Age","C - Sells Beer","C - NFC Enabled","C - Open 24 Hours","R - Restaurants - QSR"],
    sample:[["5fa964f8...","121","$87,841","36.8","Yes","Unknown","No","false"],["5fa965a5...","83","$58,509","32.1","No","Yes","No","false"],["5fa97143...","209","$60,411","35.3","Yes","Yes","No","true"]],
    notes:"Exported from Salesforce. Each row is a gas station/convenience store identified by Gbase ID. 43 columns: site capabilities (C- prefix: sells beer, diesel, NFC, EMV, 24hrs), ad category eligibility (R- prefix: lottery, automotive, restaurant, CPG ads), and local demographics (household income, median age). Also includes Average Daily Impressions \u2014 estimated foot traffic."
  },
  { id:"site_revenue", icon:"\ud83d\udcb0", name:"Site Revenue", desc:"Revenue, program, network, DMA rank per site", source:"Salesforce", format:"CSV", rows:"67,604", cols:7, color:C.cyan,
    fields:["ID - Gbase","Sellable","Schedulable","Program","Network","Average Revenue","Average DMA Rank"],
    sample:[["57745759...","true","true","IOTV2","Wayne","$136.13","8"],["57745759...","true","true","Dover - IOTV2","Dover","$531.55","8"],["57745759...","true","true","IOTV2","Wayne","$49.73","116"]],
    notes:"From Salesforce. Revenue per site-program combination. A single site can appear on multiple rows for different programs (IOTV2, Dover - IOTV2, etc.). Average Revenue is the target variable our model predicts. Sellable/Schedulable flags indicate whether the site is active for ad placement."
  },
  { id:"geo_prox", icon:"\ud83d\udccd", name:"Geographic Proximity Files", desc:"Distances to interstates, nearest sites, and major retailers", source:"Computed from geodata", format:"5 CSVs", rows:"~68K each", cols:"5\u20138", color:C.green,
    fields:["GTVID","Latitude","Longitude","nearest_site_distance_mi","distance_to_interstate_mi"],
    sample:[["5fa964f8...","33.4484","-112.074","0.82 mi","1.34 mi"],["5fa965a5...","40.7128","-74.006","0.15 mi","3.21 mi"],["5fa97143...","41.8781","-87.630","0.44 mi","0.67 mi"]],
    notes:"Five CSV files: <strong>nearest_site_distances.csv</strong>, <strong>site_interstate_distances.csv</strong>, <strong>site_walmart_distances.csv</strong>, <strong>site_mcdonalds_distances.csv</strong>, <strong>site_target_distances.csv</strong>. Each measures distance from every site to the nearest instance of that feature. Computed via haversine formula from raw lat/lon coordinates."
  },
  { id:"retailer_geo", icon:"\ud83c\udfea", name:"Retailer Location Data", desc:"McDonald\u2019s, Walmart, Target store locations (reference data)", source:"3rd-party geodata", format:"CSV", rows:"13.5K / 9.7K / 1.9K", cols:"16\u201327", color:C.orange,
    fields:["dba","store_number","address","city","state","zip_code","latitude","longitude"],
    sample:[["McDonald's","12345","123 Main St","Phoenix","AZ","85001","33.448","-112.074"],["Walmart","4521","456 Oak Ave","Houston","TX","77001","29.760","-95.370"],["Target","T-0892","789 Elm Blvd","Chicago","IL","60601","41.878","-87.630"]],
    notes:"Three CSVs: <strong>mcdonalds_geodata.csv</strong> (13,589), <strong>walmart_geodata.csv</strong> (9,784), <strong>target_geo_data.csv</strong> (1,982). Not used directly as model features \u2014 they\u2019re reference points for computing the proximity distances above. Proximity to high-traffic retailers is a strong signal for advertising revenue potential."
  }
];

const collectionEntry = {
  render() {
    const flowSvg = `<div class="flow-wrap"><svg viewBox="0 0 640 170" xmlns="http://www.w3.org/2000/svg" style="background:${C.bg};border-radius:10px;border:1px solid ${C.border}">
      <text x="70" y="16" text-anchor="middle" fill="${C.muted}" font-size="9" font-weight="600">SALESFORCE</text>
      <rect x="10" y="22" width="120" height="40" rx="8" fill="${C.accent}22" stroke="${C.accent}" stroke-width="1.5"/>
      <text x="70" y="40" text-anchor="middle" fill="${C.accent}" font-size="9" font-weight="700">Sites Base Data Set</text>
      <text x="70" y="53" text-anchor="middle" fill="${C.muted}" font-size="8">67,650 rows x 43 cols</text>
      <rect x="10" y="70" width="120" height="40" rx="8" fill="${C.cyan}22" stroke="${C.cyan}" stroke-width="1.5"/>
      <text x="70" y="88" text-anchor="middle" fill="${C.cyan}" font-size="9" font-weight="700">Site Revenue</text>
      <text x="70" y="101" text-anchor="middle" fill="${C.muted}" font-size="8">67,604 rows x 7 cols</text>
      <text x="210" y="16" text-anchor="middle" fill="${C.muted}" font-size="9" font-weight="600">GEOGRAPHIC</text>
      <rect x="150" y="22" width="120" height="40" rx="8" fill="${C.green}22" stroke="${C.green}" stroke-width="1.5"/>
      <text x="210" y="40" text-anchor="middle" fill="${C.green}" font-size="9" font-weight="700">Proximity Files (5)</text>
      <text x="210" y="53" text-anchor="middle" fill="${C.muted}" font-size="8">~68K rows each</text>
      <text x="210" y="78" text-anchor="middle" fill="${C.muted}" font-size="9" font-weight="600">3RD-PARTY</text>
      <rect x="150" y="84" width="120" height="40" rx="8" fill="${C.orange}22" stroke="${C.orange}" stroke-width="1.5"/>
      <text x="210" y="102" text-anchor="middle" fill="${C.orange}" font-size="9" font-weight="700">Retailer Locations</text>
      <text x="210" y="115" text-anchor="middle" fill="${C.muted}" font-size="8">McD / Walmart / Target</text>
      <line x1="130" y1="42" x2="330" y2="68" stroke="${C.border}" stroke-width="1.5" stroke-dasharray="4,3"/>
      <line x1="130" y1="90" x2="330" y2="78" stroke="${C.border}" stroke-width="1.5" stroke-dasharray="4,3"/>
      <line x1="270" y1="42" x2="330" y2="68" stroke="${C.border}" stroke-width="1.5" stroke-dasharray="4,3"/>
      <line x1="270" y1="104" x2="330" y2="78" stroke="${C.border}" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="295" y="58" fill="${C.dim}" font-size="8" font-style="italic">CSV</text>
      <rect x="330" y="48" width="130" height="50" rx="10" fill="${C.accentLt}22" stroke="${C.accentLt}" stroke-width="2"/>
      <text x="395" y="69" text-anchor="middle" fill="${C.accentLt}" font-size="10" font-weight="700">Data Ingestion</text>
      <text x="395" y="84" text-anchor="middle" fill="${C.muted}" font-size="8">Load via Polars ETL</text>
      <line x1="460" y1="73" x2="498" y2="73" stroke="${C.accentLt}" stroke-width="2" marker-end="url(#ah)"/>
      <rect x="498" y="48" width="130" height="50" rx="10" fill="${C.green}22" stroke="${C.green}" stroke-width="2"/>
      <text x="563" y="69" text-anchor="middle" fill="${C.green}" font-size="10" font-weight="700">data/input/</text>
      <text x="563" y="84" text-anchor="middle" fill="${C.muted}" font-size="8">~67K sites, 7 source files</text>
      <text x="395" y="145" text-anchor="middle" fill="${C.dim}" font-size="8">Retailer locations \u2192 compute distances \u2192 proximity CSVs</text>
      <defs><marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="${C.accentLt}"/></marker></defs>
    </svg></div>`;
    let cards=`<p class="cap" style="margin-top:20px">Click a source to explore its fields, sample data, and collection details:</p><div class="source-grid">`;
    DATA_SOURCES.forEach(s=>{cards+=`<div class="source-card" data-src="${s.id}"><div class="source-icon">${s.icon}</div><div class="source-name">${s.name}</div><div class="source-desc">${s.desc}</div><div class="source-meta"><span>${s.format}</span><span>${s.rows} rows</span><span>${s.cols} cols</span></div></div>`;});
    cards+=`</div>`;
    return `
      <p class="etext">Data collection is where everything begins. Our pipeline pulls structured data from <strong>multiple CSV sources</strong> to build a complete picture of every site in our network. Two primary sources come from Salesforce (site attributes and revenue), supplemented by geographic proximity data computed from 3rd-party retailer locations.</p>
      ${analogyHTML("Imagine evaluating 67,000 gas stations for advertising potential. Salesforce hands you two spreadsheets: one describing each station (does it sell beer? what's the local median income?) and one showing ad revenue. Separately, a geography team measures how far each station is from the nearest highway, Walmart, McDonald's, and Target. Together these paint the full picture.")}
      ${flowSvg}
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val" style="color:${C.accent}">~67K</div><div class="stat-label">Unique sites</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${C.green}">7</div><div class="stat-label">Source CSV files</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${C.orange}">25K+</div><div class="stat-label">Retailer locations</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${C.cyan}">CSV</div><div class="stat-label">Uniform format</div></div>
      </div>
      ${cards}
      <div class="source-detail" id="source-detail"></div>
      ${whyHTML("We keep collection simple and auditable \u2014 CSV files loaded via Polars (10\u201320x faster than pandas). Raw files are preserved in <code>data/input/</code> so any team member can open them in Excel. Proximity features are reproducible via scripts \u2014 if a retailer dataset updates, we rerun the distance calculations.")}`;
  },
  init() {
    document.querySelectorAll(".source-card").forEach(card=>{
      card.addEventListener("click",()=>{
        const s=DATA_SOURCES.find(d=>d.id===card.dataset.src); if(!s) return;
        document.querySelectorAll(".source-card").forEach(c=>c.classList.remove("active")); card.classList.add("active");
        const det=document.getElementById("source-detail");
        det.innerHTML=`<div class="detail-header" style="color:${s.color}">${s.icon} ${s.name}</div>
          <div class="detail-section"><h4>Key Fields</h4><div style="display:flex;flex-wrap:wrap;gap:6px">${s.fields.map(f=>`<code>${f}</code>`).join("")}</div></div>
          <div class="detail-section"><h4>Sample Rows</h4><div class="sample-wrap"><table class="sample-table"><thead><tr>${s.fields.map(f=>`<th>${f}</th>`).join("")}</tr></thead><tbody>${s.sample.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div></div>
          <div class="detail-section"><h4>Notes</h4><p style="font-size:13px;line-height:1.6">${s.notes}</p></div>`;
        det.classList.add("visible");
      });
    });
  }
};


/* ================================================================
 *  ENTRY: Data Cleaning
 * ================================================================ */
const cleaningEntry = {
  render() {
    return `
      <p class="etext">Before any modeling can happen, raw data needs to be <strong>cleaned, standardized, and transformed</strong>. Our ETL pipeline in <code>data_transform.py</code> takes ~1.4 million monthly records and transforms them into a clean, ML-ready dataset of 26,099 active sites. Click each step below to see exactly what happens.</p>

      ${analogyHTML("Imagine you received a massive stack of monthly reports from 67,000 gas stations. Some reports have typos, some leave fields blank, some use \"Yes\" where others use \"true.\" Before you can analyze anything, you need to: standardize every form, consolidate monthly reports into one summary per station, toss out stations that are no longer active, and convert everything to numbers a computer can process.")}

      <p class="cap" style="margin-top:20px">Click each step to expand the details:</p>

      <div id="cleaning-steps">

        <div class="step-card" data-step="1">
          <div style="display:flex;align-items:center">
            <span class="step-num" style="background:${C.accent}22;color:${C.accent}">1</span>
            <span class="step-title" style="color:${C.accent}">Null Value Handling</span>
          </div>
          <div class="step-sub">Empty strings, "NA", "null", and "Unknown" \u2192 treated as missing</div>
          <div class="step-detail">
            <p>When loading <code>site_scores_revenue_and_diagnostics.csv</code>, the pipeline explicitly treats four string patterns as null values: <code>""</code>, <code>"NA"</code>, <code>"null"</code>, and <code>"Unknown"</code>. This prevents the model from treating the word "Unknown" as a real data value.</p>
            <div class="before-after">
              <div class="ba-col"><h5>Before</h5>
                <div style="font-family:monospace;font-size:11px;color:${C.orange}">
                  C - NFC Enabled: "Unknown"<br>
                  C - EMV Enabled: ""<br>
                  Avg Household Income: "null"<br>
                  Median Age: "NA"
                </div>
              </div>
              <div class="ba-arrow">\u2192</div>
              <div class="ba-col"><h5>After</h5>
                <div style="font-family:monospace;font-size:11px;color:${C.green}">
                  C - NFC Enabled: <em>null</em><br>
                  C - EMV Enabled: <em>null</em><br>
                  Avg Household Income: <em>null</em><br>
                  Median Age: <em>null</em>
                </div>
              </div>
            </div>
            ${detailHTML("Schema inference uses the first 10,000 rows to determine column types. This catches most type issues early, but edge cases (like a column that\u2019s numeric for 10K rows then has a string) are handled by Polars\u2019 strict typing.","Why this matters")}
          </div>
        </div>

        <div class="step-card" data-step="2">
          <div style="display:flex;align-items:center">
            <span class="step-num" style="background:${C.cyan}22;color:${C.cyan}">2</span>
            <span class="step-title" style="color:${C.cyan}">Monthly \u2192 Site-Level Aggregation</span>
          </div>
          <div class="step-sub">1.4M monthly records consolidated into 57,675 unique site rows</div>
          <div class="step-detail">
            <p>The raw data has one row per site per month. The pipeline aggregates to <strong>one row per site</strong> using different strategies depending on the column type:</p>
            <table class="tt">
              <thead><tr><th>Column Type</th><th>Strategy</th><th>Example</th></tr></thead>
              <tbody>

      <line x1="594" y1="74" x2="620" y2="74" stroke="${C.dim}" stroke-width="1"/>
      <text x="622" y="70" fill="${C.text}" font-size="7" font-weight="600">$ Revenue</text>

      <!-- Legend -->
      <rect x="5" y="145" width="670" height="30" rx="6" fill="#0f172a" stroke="${C.border}" stroke-width="0.5"/>
      <text x="15" y="162" fill="${C.muted}" font-size="7">Each Residual Block:</text>
      <text x="120" y="162" fill="${C.text}" font-size="7">Linear → BatchNorm → ReLU → Dropout(0.2) → Linear → BatchNorm → <tspan fill="${C.accent}">+ skip</tspan> → ReLU</text>

    </svg></div>`;

    let cards = `<p class="cap" style="margin-top:20px">Click each step to explore the modeling process:</p><div id="modeling-steps">`;
    MODEL_STEPS.forEach(s => {
      cards += `<div class="step-card" data-step="${s.num}">
        <div style="display:flex;align-items:center">
          <span class="step-num" style="background:${s.color}22;color:${s.color}">${s.num}</span>

        <div class="step-sub">${s.sub}</div>
        <div class="step-detail">${s.detail}</div>
      </div>`;
    });
    cards += `</div>`;

    return `
      <p class="etext">Modeling is where the cleaned, combined dataset is transformed into a <strong>predictive engine</strong>. Our primary model is a PyTorch neural network with learned embeddings for categorical features, residual connections for depth, and Huber Loss for outlier robustness — all optimized for Apple Silicon (MPS). The model ingests ~54 features across 3 input streams and outputs either a revenue prediction (regression) or a top-performer probability (lookalike classification).</p>

      ${analogyHTML("Training a model is like teaching someone to appraise gas stations. You show them thousands of examples with known values — here's a station near a highway with a McDonald's nearby, selling diesel, in a high-income area, and it earns $600/month. After seeing 18,000+ examples, the model develops an intuition for which features matter most. Then you quiz it on 3,900 stations it has never seen — if its appraisals are close to reality, the model has learned real patterns, not just memorized answers.")}

      ${archSvg}

      <div class="stats-row">
        <div class="stat-card"><div class="stat-val" style="color:${C.accent}">~54</div><div class="stat-label">Input features</div></div>

        <div class="stat-card"><div class="stat-val" style="color:${C.orange}">~350K</div><div class="stat-label">Parameters</div></div>

      </div>

      ${cards}

      ${whyHTML("The architecture was designed with three specific constraints: <strong>(1)</strong> Mixed feature types (numeric, categorical, boolean) require different processing — embeddings for categories, scaling for numerics. <strong>(2)</strong> Apple M4 MPS compatibility limits available operations — we use only Linear, BatchNorm, ReLU, Embedding, and Dropout, all well-supported by Metal. <strong>(3)</strong> Revenue data has heavy-tailed outliers, so Huber Loss provides robustness where MSE would distort training.")}
    `;
  },

  init() {
    // Accordion for step cards
    document.querySelectorAll("#modeling-steps .step-card").forEach(card => {
      card.addEventListener("click", () => {
        const wasOpen = card.classList.contains("open");
        document.querySelectorAll("#modeling-steps .step-card").forEach(c => c.classList.remove("open"));
        if (!wasOpen) card.classList.add("open");
      });
    });

    // Split visualization (stacked bar)
    const splitEl = document.getElementById("split-viz");
    if (splitEl) {
      const splits = [
        { label: "Train (70%)", pct: 70, count: "18,269", color: C.accent },
        { label: "Validation (15%)", pct: 15, count: "3,915", color: C.cyan },
        { label: "Test (15%)", pct: 15, count: "3,915", color: C.pink },
      ];
      splitEl.innerHTML = `<div style="display:flex;border-radius:8px;overflow:hidden;height:32px;margin:8px 0">` +
        splits.map(s => `<div style="width:${s.pct}%;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0f172a">${s.label}</div>`).join("") +
        `</div><div style="display:flex;justify-content:space-between;font-size:11px;color:${C.muted}">` +
        splits.map(s => `<span>${s.count} sites</span>`).join("") + `</div>`;
    }

    // Input streams visualization
    const streamsEl = document.getElementById("input-streams-viz");
    if (streamsEl) {
      const streams = [
        { name: "Numeric", count: 17, dim: "17", color: C.cyan, process: "Scale → clip → normalize" },
        { name: "Categorical", count: 7, dim: "~72", color: C.green, process: "LabelEncode → Embed (4–16 dim each)" },
        { name: "Boolean", count: 30, dim: "30", color: C.orange, process: "Pass through as 0/1 floats" },
      ];
      const totalDim = 17 + 72 + 30;
      streamsEl.innerHTML = streams.map(s => {
        const pct = Math.max(20, Math.round((parseInt(s.dim) / totalDim) * 100));
        return `<div style="display:flex;align-items:center;gap:10px;margin:6px 0;padding:8px 12px;background:#111827;border-radius:8px;border-left:3px solid ${s.color}">
          <span style="font-size:18px;font-weight:700;color:${s.color};min-width:30px">${s.count}</span>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600;color:${s.color}">${s.name}</div>
            <div style="font-size:10px;color:${C.muted}">${s.process}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:11px;font-weight:600;color:${C.text}">→ ${s.dim} dims</div>
          </div>
        </div>`;
      }).join("") + `<div style="text-align:right;font-size:11px;color:${C.muted};margin-top:4px">Total input dimension: <strong style="color:${C.text}">~${totalDim}</strong> after concatenation</div>`;
    }

    // Architecture diagram (residual block detail)
    const archEl = document.getElementById("arch-diagram");
    if (archEl) {
      const blocks = [
        { inDim: "~100", outDim: "512", label: "Block 1" },
        { inDim: "512", outDim: "256", label: "Block 2" },
        { inDim: "256", outDim: "128", label: "Block 3" },
        { inDim: "128", outDim: "64", label: "Block 4" },
      ];
      archEl.innerHTML = `<div style="display:flex;gap:4px;align-items:end;margin:10px 0">` +
        blocks.map((b, i) => {
          const h = 30 + (4 - i) * 14;
          return `<div style="display:flex;flex-direction:column;align-items:center;flex:1">
            <div style="font-size:10px;color:${C.green};font-weight:600;margin-bottom:4px">${b.label}</div>
            <div style="width:100%;height:${h}px;background:${C.green}18;border:1px solid ${C.green};border-radius:6px;display:flex;align-items:center;justify-content:center">
              <span style="font-size:11px;color:${C.text};font-weight:700">${b.outDim}</span>
            </div>
            <div style="font-size:9px;color:${C.muted};margin-top:2px">${b.inDim} → ${b.outDim}</div>
          </div>`;
        }).join(`<div style="color:${C.dim};font-size:16px;margin-bottom:20px">→</div>`) +
        `<div style="color:${C.dim};font-size:16px;margin-bottom:20px">→</div>
         <div style="display:flex;flex-direction:column;align-items:center">
           <div style="font-size:10px;color:${C.orange};font-weight:600;margin-bottom:4px">Output</div>
           <div style="width:50px;height:30px;background:${C.orange}22;border:1px solid ${C.orange};border-radius:6px;display:flex;align-items:center;justify-content:center">
             <span style="font-size:11px;color:${C.text};font-weight:700">1</span>
           </div>
           <div style="font-size:9px;color:${C.muted};margin-top:2px">64 → 1</div>
         </div>` +
        `</div>`;
    }

    // Training loop diagram
    const loopEl = document.getElementById("loop-diagram");
    if (loopEl) {
      const steps = [
        { icon: "→", label: "Forward Pass", desc: "Data flows through network", color: C.cyan },
        { icon: "δ", label: "Huber Loss", desc: "Compute error vs true revenue", color: C.accent },
        { icon: "←", label: "Backward Pass", desc: "Gradients flow back (clipped to 1.0)", color: C.pink },
        { icon: "⟳", label: "AdamW Update", desc: "Adjust weights (lr=1e-4)", color: C.orange },
        { icon: "?", label: "Check Val Loss", desc: "Improved → save. No improve × 10 → stop", color: C.green },
      ];
      loopEl.innerHTML = `<div style="display:flex;gap:4px;margin:10px 0;flex-wrap:wrap">` +
        steps.map(s => `<div style="flex:1;min-width:110px;padding:8px;background:#111827;border-radius:8px;border-top:2px solid ${s.color};text-align:center">
          <div style="font-size:18px;color:${s.color};font-weight:700;font-family:monospace">${s.icon}</div>
          <div style="font-size:11px;font-weight:600;color:${s.color};margin-top:4px">${s.label}</div>
          <div style="font-size:10px;color:${C.muted};margin-top:2px">${s.desc}</div>
        </div>`).join("") + `</div>`;
    }

    // Model comparison cards
    const compEl = document.getElementById("model-comparison");
    if (compEl) {
      const models = [
        { name: "Neural Network", tag: "PRIMARY", color: C.pink, icon: "🧠",
          pros: ["Learned embeddings", "Residual connections", "MPS GPU acceleration"],
          cons: ["Slower training", "More hyperparameters", "Less interpretable"] },
        { name: "XGBoost", tag: "ALTERNATIVE", color: C.green, icon: "🌲",
          pros: ["Fast training (hist)", "Built-in feature importance", "Handles missing values"],
          cons: ["One-hot categoricals", "No embedding learning", "No MPS support"] },
        { name: "CatBoost", tag: "ALTERNATIVE", color: C.cyan, icon: "🐱",
          pros: ["Native categoricals", "Ordered boosting", "Low overfitting"],
          cons: ["Larger memory footprint", "Slower than XGBoost", "Less GPU support"] },
      ];
      compEl.innerHTML = `<div style="display:flex;gap:8px;flex-wrap:wrap">` +
        models.map(m => `<div style="flex:1;min-width:170px;padding:12px;background:#111827;border-radius:10px;border:1px solid ${m.color}44">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <span style="font-size:18px">${m.icon}</span>
            <div>
              <div style="font-size:12px;font-weight:700;color:${m.color}">${m.name}</div>
              <span style="font-size:9px;padding:1px 6px;border-radius:4px;background:${m.color}22;color:${m.color}">${m.tag}</span>
            </div>
          </div>
          <div style="font-size:10px;color:${C.green};margin-bottom:4px">✓ ${m.pros.join(`</div><div style="font-size:10px;color:${C.green}">✓ `)}</div>
          <div style="font-size:10px;color:${C.muted};margin-top:4px">• ${m.cons.join(`</div><div style="font-size:10px;color:${C.muted}">• `)}</div>
        </div>`).join("") + `</div>`;
    }
  }
};


/* ================================================================
 *  PLACEHOLDER ENTRIES
 * ================================================================ */
function placeholderEntry(icon,name){return{render:()=>`<div class="placeholder"><div class="placeholder-icon">${icon}</div><div class="placeholder-text">The <strong>${name}</strong> entry is next.<br>We'll build this out with interactive visualizations.</div></div>`,init(){}};}


/* ================================================================
 *  ENTRIES REGISTRY
 * ================================================================ */
const ENTRIES=[
  {id:"collection",title:"1. Data Collection",category:"Pipeline Stages",question:"Where does our data come from and how do we gather it?",entry:collectionEntry,stage:0},
  {id:"cleaning",title:"2. Data Cleaning",category:"Pipeline Stages",question:"How do we fix errors, standardize formats, and prepare data for modeling?",entry:cleaningEntry,stage:1},
  {id:"combining",title:"3. Data Combining",category:"Pipeline Stages",question:"How do we join data from different sources into one dataset?",entry:combiningEntry,stage:2},
  {id:"modeling",title:"4. Modeling",category:"Pipeline Stages",question:"How do we train the model to make predictions?",entry:modelingEntry,stage:3},
  {id:"testing",title:"5. Testing & Validation",category:"Pipeline Stages",question:"How do we know the model actually works?",entry:placeholderEntry("\u2705","Testing & Validation"),stage:4},
  {id:"production",title:"6. Productionizing",category:"Pipeline Stages",question:"How do we deploy the model and keep it running reliably?",entry:placeholderEntry("\ud83d\ude80","Productionizing"),stage:5},
];


/* ================================================================
 *  SHELL
 * ================================================================ */
let activeId=ENTRIES[0].id;
const stageLabels=["Collect","Clean","Combine","Model","Test","Deploy"];
const stageColors=[C.accent,C.cyan,C.green,C.orange,C.pink,C.accentLt];

function renderPipelineViz(){
  const a=ENTRIES.find(e=>e.id===activeId);const as=a?a.stage:0;
  let h='<div class="pipeline-progress">';
  stageLabels.forEach((l,i)=>{
    const ds=i<as?`background:${C.green};border-color:${C.green}`:i===as?`background:${stageColors[i]};border-color:${stageColors[i]};box-shadow:0 0 6px ${stageColors[i]}44`:"";
    const cls=i<as?"done":i===as?"current":"";
    h+=`<div class="pip-step ${cls}" style="${i===as?"color:"+C.text+";font-weight:600":""}"><div class="pip-dot" style="${ds}"></div>${l}</div>`;
    if(i<5) h+=`<div class="pip-line" style="${i<as?`background:${C.green}`:""}"></div>`;
  });
  h+='</div>';document.getElementById("pipeline-viz").innerHTML=h;
}
function renderNav(){
  document.getElementById("count-label").textContent=`Interactive reference \u00b7 ${ENTRIES.length} stages`;
  const cats=[...new Set(ENTRIES.map(e=>e.category))];
  let h="";cats.forEach(cat=>{h+=`<div class="cat-label">${cat}</div>`;ENTRIES.filter(e=>e.category===cat).forEach(e=>{h+=`<button class="nav-btn${e.id===activeId?" active":""}" data-id="${e.id}">${e.title}</button>`;});});
  document.getElementById("nav-list").innerHTML=h;
  document.querySelectorAll(".nav-btn").forEach(b=>{b.addEventListener("click",()=>{activeId=b.dataset.id;renderPipelineViz();renderNav();renderEntry();});});
}
function renderEntry(){
  const e=ENTRIES.find(e=>e.id===activeId);
  document.getElementById("ep").innerHTML=`<span class="pill">${e.category}</span>`;
  document.getElementById("entry-title").textContent=e.title;
  document.getElementById("entry-question").textContent=e.question;
  document.getElementById("ec").innerHTML=e.entry.render();
  if(e.entry.init) e.entry.init();
}
renderPipelineViz();renderNav();renderEntry();
</script>
