<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Data Pipeline Glossary</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; min-height: 100vh; }
#sidebar { width: 260px; flex-shrink: 0; border-right: 1px solid #334155; padding: 24px 0; overflow-y: auto; }
.sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid #334155; }
.sidebar-header h1 { font-size: 17px; font-weight: 700; }
.sidebar-header p { font-size: 12px; color: #64748b; margin-top: 4px; }
.cat-label { padding: 0 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #64748b; margin: 16px 0 6px; }
.nav-btn { display: block; width: 100%; text-align: left; border: none; cursor: pointer; background: transparent; border-left: 3px solid transparent; padding: 8px 20px; font-family: inherit; font-size: 13px; color: #94a3b8; transition: all 0.15s; }
.nav-btn:hover { background: rgba(99,102,241,0.06); }
.nav-btn.active { background: rgba(99,102,241,0.09); border-left-color: #6366f1; color: #818cf8; font-weight: 600; }
.sidebar-footer { padding: 20px; margin-top: 20px; border-top: 1px solid #334155; font-size: 11px; color: #64748b; line-height: 1.5; }
.pipeline-progress { padding: 16px 20px; border-bottom: 1px solid #334155; }
.pip-step { display: flex; align-items: center; gap: 10px; padding: 4px 0; font-size: 12px; color: #64748b; }
.pip-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #334155; flex-shrink: 0; }
.pip-line { width: 2px; height: 12px; background: #334155; margin-left: 4px; }
#main { flex: 1; padding: 32px 40px; max-width: 740px; overflow-y: auto; }
.pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 99px; background: rgba(99,102,241,0.13); color: #6366f1; border: 1px solid rgba(99,102,241,0.27); }
#entry-title { font-size: 24px; font-weight: 700; margin: 8px 0 4px; }
#entry-question { font-size: 15px; color: #818cf8; font-style: italic; margin-bottom: 24px; }
.etext { font-size: 14px; line-height: 1.65; margin-bottom: 14px; }
.analogy-box, .why-box, .detail-box { border-radius: 10px; padding: 14px 18px; margin-top: 14px; }
.analogy-box { background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.2); }
.why-box { background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.2); margin-top: 16px; }
.detail-box { background: rgba(251,146,60,0.07); border: 1px solid rgba(251,146,60,0.2); margin-top: 14px; }
.box-label { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
.analogy-box .box-label { color: #34d399; }
.why-box .box-label { color: #818cf8; }
.detail-box .box-label { color: #fb923c; }
.box-body { font-size: 13px; line-height: 1.6; }
.stats-row { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
.stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 100px; }
.stat-val { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.cap { font-size: 12px; color: #64748b; margin-bottom: 8px; }
.flow-wrap { margin: 20px 0; }
.flow-wrap svg { width: 100%; display: block; }
table.tt { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 14px; }
table.tt th { padding: 6px 10px; text-align: left; color: #64748b; font-weight: 500; border-bottom: 1px solid #334155; }
table.tt td { padding: 6px 10px; }
table.tt tr:nth-child(even) td { background: #111827; }
code { background: #1e293b; padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: "SF Mono", Monaco, Consolas, monospace; }
.source-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
.source-card { background: #1e293b; border: 2px solid #334155; border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
.source-card:hover { border-color: #475569; }
.source-card.active { border-color: #6366f1; background: rgba(99,102,241,0.08); }
.source-icon { font-size: 22px; margin-bottom: 6px; }
.source-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.source-desc { font-size: 11px; color: #94a3b8; line-height: 1.4; }
.source-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.source-meta span { font-size: 10px; padding: 2px 8px; border-radius: 6px; background: rgba(99,102,241,0.1); color: #94a3b8; }
.source-detail { background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 18px; margin-top: 12px; display: none; }
.source-detail.visible { display: block; }
.detail-header { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.detail-section { margin-top: 14px; }
.detail-section h4 { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.sample-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.sample-table th { padding: 5px 8px; text-align: left; color: #64748b; font-weight: 600; border-bottom: 1px solid #334155; background: #0f172a; }
.sample-table td { padding: 5px 8px; border-bottom: 1px solid #1e293b; font-family: "SF Mono", Monaco, Consolas, monospace; }
.sample-wrap { max-height: 180px; overflow-y: auto; border-radius: 8px; border: 1px solid #334155; }
.step-card { background: #1e293b; border: 2px solid #334155; border-radius: 10px; padding: 16px; margin-top: 12px; cursor: pointer; transition: all 0.15s; }
.step-card:hover { border-color: #475569; }
.step-card.open { border-color: #6366f1; }
.step-num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 12px; font-weight: 700; margin-right: 8px; flex-shrink: 0; }
.step-title { font-size: 14px; font-weight: 700; }
.step-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.step-detail { margin-top: 12px; display: none; font-size: 13px; line-height: 1.6; }
.step-card.open .step-detail { display: block; }
.before-after { display: grid; grid-template-columns: 1fr 30px 1fr; gap: 8px; align-items: start; margin: 14px 0; }
.ba-col { background: #111827; border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 12px; }
.ba-col h5 { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
.ba-arrow { display: flex; align-items: center; justify-content: center; color: #6366f1; font-size: 18px; padding-top: 24px; }
.funnel-row { margin: 4px 0; display: flex; align-items: center; gap: 10px; }
.funnel-bar { height: 26px; border-radius: 5px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: 600; color: #0f172a; min-width: 40px; }
.funnel-label { font-size: 12px; color: #94a3b8; min-width: 160px; }
.placeholder { text-align: center; padding: 60px 20px; color: #475569; }
.placeholder-icon { font-size: 48px; margin-bottom: 12px; }
.placeholder-text { font-size: 15px; line-height: 1.6; }
.src-ref { font-size: 11px; color: #475569; margin-top: 10px; font-family: "SF Mono", Monaco, Consolas, monospace; }
</style>
</head>

const STAGE_DATA = [{"id": "collection", "title": "1. Data Collection", "category": "Pipeline Stages", "question": "Where does our data come from and how do we gather it?", "intro": "Data collection is where everything begins. Our pipeline pulls structured data from <strong>multiple CSV sources</strong> to build a complete picture of every site in our network. Two primary sources come from Salesforce (site attributes and revenue), supplemented by geographic proximity data computed from 3rd-party retailer locations.", "analogy": "Imagine evaluating 67,000 gas stations for advertising potential. Salesforce hands you two spreadsheets: one describing each station (does it sell beer? what's the local median income?) and one showing ad revenue. Separately, a geography team measures how far each station is from the nearest highway, Walmart, McDonald's, and Target. Together these paint the full picture.", "why": "We keep collection simple and auditable — CSV files loaded via Polars (10–20x faster than pandas). Raw files are preserved in <code>data/input/</code> so any team member can open them in Excel. Proximity features are reproducible via scripts — if a retailer dataset updates, we rerun the distance calculations.", "steps": [], "sources": [{"id": "sites_base", "icon": "⛽", "name": "Sites – Base Data Set", "desc": "Site attributes, capabilities, ad eligibility, demographics", "source": "Salesforce", "format": "CSV", "rows": "67,650", "cols": 43, "color": "accent", "fields": ["ID - Gbase", "Avg Daily Impressions", "Avg Household Income", "Median Age", "C - Sells Beer", "C - NFC Enabled", "C - Open 24 Hours", "R - Restaurants - QSR"], "sample": [["5fa964f8...", "121", "$87,841", "36.8", "Yes", "Unknown", "No", "false"], ["5fa965a5...", "83", "$58,509", "32.1", "No", "Yes", "No", "false"]], "notes": "Exported from Salesforce. Each row is a gas station/convenience store identified by Gbase ID. 43 columns: site capabilities (C- prefix: sells beer, diesel, NFC, EMV, 24hrs), ad category eligibility (R- prefix: lottery, automotive, restaurant, CPG ads), and local demographics (household income, median age). Also includes Average Daily Impressions — estimated foot traffic."}, {"id": "site_revenue", "icon": "💰", "name": "Site Revenue", "desc": "Revenue, program, network, DMA rank per site", "source": "Salesforce", "format": "CSV", "rows": "67,604", "cols": 7, "color": "cyan", "fields": ["ID - Gbase", "Sellable", "Schedulable", "Program", "Network", "Average Revenue", "Average DMA Rank"], "sample": [["57745759...", "true", "true", "IOTV2", "Wayne", "$136.13", "8"], ["57745759...", "true", "true", "Dover - IOTV2", "Dover", "$531.55", "8"]], "notes": "From Salesforce. Revenue per site-program combination. A single site can appear on multiple rows for different programs (IOTV2, Dover - IOTV2, etc.). Average Revenue is the target variable our model predicts. Sellable/Schedulable flags indicate whether the site is active for ad placement."}, {"id": "geo_prox", "icon": "📍", "name": "Geographic Proximity Files", "desc": "Distances to interstates, nearest sites, and major retailers", "source": "Computed from geodata", "format": "5 CSVs", "rows": "~68K each", "cols": 8, "color": "green", "fields": ["GTVID", "Latitude", "Longitude", "nearest_site_distance_mi", "distance_to_interstate_mi"], "sample": [["5fa964f8...", "33.4484", "-112.074", "0.82 mi", "1.34 mi"], ["5fa965a5...", "40.7128", "-74.006", "0.15 mi", "3.21 mi"]], "notes": "Five CSV files: <strong>nearest_site_distances.csv</strong>, <strong>site_interstate_distances.csv</strong>, <strong>site_walmart_distances.csv</strong>, <strong>site_mcdonalds_distances.csv</strong>, <strong>site_target_distances.csv</strong>. Each measures distance from every site to the nearest instance of that feature. Computed via haversine formula from raw lat/lon coordinates."}, {"id": "retailer_geo", "icon": "🏪", "name": "Retailer Location Data", "desc": "McDonald’s, Walmart, Target store locations (reference data)", "source": "3rd-party geodata", "format": "CSV", "rows": "13.5K / 9.7K / 1.9K", "cols": 27, "color": "orange", "fields": ["dba", "store_number", "address", "city", "state", "zip_code", "latitude", "longitude"], "sample": [["McDonald's", "12345", "123 Main St", "Phoenix", "AZ", "85001", "33.448", "-112.074"], ["Walmart", "4521", "456 Oak Ave", "Houston", "TX", "77001", "29.760", "-95.370"]], "notes": "Three CSVs: <strong>mcdonalds_geodata.csv</strong> (13,589), <strong>walmart_geodata.csv</strong> (9,784), <strong>target_geo_data.csv</strong> (1,982). Not used directly as model features — they’re reference points for computing the proximity distances above. Proximity to high-traffic retailers is a strong signal for advertising revenue potential."}], "stats_row": [{"value": "~57,675", "label": "Unique sites", "color": "#6366f1"}, {"value": "18", "label": "Source CSV files", "color": "#34d399"}, {"value": "25K+", "label": "Retailer locations", "color": "#fb923c"}, {"value": "CSV", "label": "Uniform format", "color": "#22d3ee"}], "flow_svg": "<svg viewBox=\"0 0 640 170\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#0f172a;border-radius:10px;border:1px solid #334155\"><text x=\"70\" y=\"16\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"9\" font-weight=\"600\">SALESFORCE</text><rect x=\"10\" y=\"22\" width=\"120\" height=\"40\" rx=\"8\" fill=\"#6366f122\" stroke=\"#6366f1\" stroke-width=\"1.5\"/><text x=\"70\" y=\"40\" text-anchor=\"middle\" fill=\"#6366f1\" font-size=\"9\" font-weight=\"700\">Sites Base Data Set</text><text x=\"70\" y=\"53\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"8\">67,650 rows x 43 cols</text><rect x=\"10\" y=\"70\" width=\"120\" height=\"40\" rx=\"8\" fill=\"#22d3ee22\" stroke=\"#22d3ee\" stroke-width=\"1.5\"/><text x=\"70\" y=\"88\" text-anchor=\"middle\" fill=\"#22d3ee\" font-size=\"9\" font-weight=\"700\">Site Revenue</text><text x=\"70\" y=\"101\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"8\">67,604 rows x 7 cols</text><text x=\"210\" y=\"16\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"9\" font-weight=\"600\">GEOGRAPHIC</text><rect x=\"150\" y=\"22\" width=\"120\" height=\"40\" rx=\"8\" fill=\"#34d39922\" stroke=\"#34d399\" stroke-width=\"1.5\"/><text x=\"210\" y=\"40\" text-anchor=\"middle\" fill=\"#34d399\" font-size=\"9\" font-weight=\"700\">Proximity Files (5)</text><text x=\"210\" y=\"53\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"8\">~68K rows each</text><text x=\"210\" y=\"78\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"9\" font-weight=\"600\">3RD-PARTY</text><rect x=\"150\" y=\"84\" width=\"120\" height=\"40\" rx=\"8\" fill=\"#fb923c22\" stroke=\"#fb923c\" stroke-width=\"1.5\"/><text x=\"210\" y=\"102\" text-anchor=\"middle\" fill=\"#fb923c\" font-size=\"9\" font-weight=\"700\">Retailer Locations</text><text x=\"210\" y=\"115\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"8\">McD / Walmart / Target</text><line x1=\"130\" y1=\"42\" x2=\"330\" y2=\"68\" stroke=\"#334155\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\"/><line x1=\"130\" y1=\"90\" x2=\"330\" y2=\"78\" stroke=\"#334155\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\"/><line x1=\"270\" y1=\"42\" x2=\"330\" y2=\"68\" stroke=\"#334155\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\"/><line x1=\"270\" y1=\"104\" x2=\"330\" y2=\"78\" stroke=\"#334155\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\"/><rect x=\"330\" y=\"48\" width=\"130\" height=\"50\" rx=\"10\" fill=\"#818cf822\" stroke=\"#818cf8\" stroke-width=\"2\"/><text x=\"395\" y=\"69\" text-anchor=\"middle\" fill=\"#818cf8\" font-size=\"10\" font-weight=\"700\">Data Ingestion</text><text x=\"395\" y=\"84\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"8\">Load via Polars ETL</text><line x1=\"460\" y1=\"73\" x2=\"498\" y2=\"73\" stroke=\"#818cf8\" stroke-width=\"2\" marker-end=\"url(#ah)\"/><rect x=\"498\" y=\"48\" width=\"130\" height=\"50\" rx=\"10\" fill=\"#34d39922\" stroke=\"#34d399\" stroke-width=\"2\"/><text x=\"563\" y=\"69\" text-anchor=\"middle\" fill=\"#34d399\" font-size=\"10\" font-weight=\"700\">data/input/</text><text x=\"563\" y=\"84\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"8\">~57,675 sites, 18 source files</text><defs><marker id=\"ah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#818cf8\"/></marker></defs></svg>", "stage_index": 0}, {"id": "cleaning", "title": "2. Data Cleaning", "category": "Pipeline Stages", "question": "How do we fix errors, standardize formats, and prepare data for modeling?", "intro": "Before any modeling can happen, raw data needs to be <strong>cleaned, standardized, and transformed</strong>. Our ETL pipeline in <code>data_transform.py</code> takes ~1.4 million monthly records and transforms them into a clean, ML-ready dataset of active sites.", "analogy": "Imagine you received a massive stack of monthly reports from 67,000 gas stations. Some reports have typos, some leave fields blank, some use \"Yes\" where others use \"true.\" Before you can analyze anything, you need to: standardize every form, consolidate monthly reports into one summary per station, toss out stations that are no longer active, and convert everything to numbers a computer can process.", "why": "The full cleaning pipeline runs via <code>python3 -m site_scoring.data_transform</code> and outputs two files: <strong>site_aggregated_precleaned.parquet</strong> (all sites) as a checkpoint, and <strong>site_training_data.parquet</strong> (active sites only) as the final ML-ready dataset. Both are saved as Parquet for fast loading and as CSV for manual inspection.", "steps": [{"id": "null-handling", "title": "Null Value Handling", "step_order": 0, "color": "accent", "sub": "Empty strings, \"NA\", \"null\", and \"Unknown\" treated as missing on load", "analogy": "Before analyzing any data, we declare what \"missing\" looks like. The source data uses four different representations of emptiness. Standardizing them upfront prevents the model from treating the word \"Unknown\" as meaningful data.", "why": null, "details": [{"title": "Schema inference", "body": "Schema inference uses the first 10,000 rows to determine column types. This catches most type issues early, but edge cases (like a column that is numeric for 10K rows then has a string) are handled by Polars strict typing."}], "extra_html": "", "source_function": "load_site_scores", "source_file": "site_scoring/data_transform.py", "source_line": 112}, {"id": "aggregation", "title": "Monthly to Site-Level Aggregation", "step_order": 1, "color": "cyan", "sub": "1.4M monthly records consolidated into one row per unique site", "analogy": "You have 47 monthly report cards per station. This step staples them into one summary card with totals, averages, and the most recent status.", "why": "Different column types require different aggregation strategies: revenue metrics are summed then averaged, site metadata takes the most recent value, and temporal columns count distinct months.", "details": [{"title": "Relative strength features", "body": "Also computes relative strength features — momentum indicators that compare recent performance (3-month) to longer windows (6, 12, 24 months). These detect whether a site is trending up or down. Missing values default to 1.0 (neutral trend)."}], "extra_html": "", "source_function": "aggregate_site_metrics", "source_file": "site_scoring/data_transform.py", "source_line": 514}, {"id": "geo-joins", "title": "Geospatial Feature Joining", "step_order": 2, "color": "green", "sub": "6 distance files left-joined onto site data via GTVID", "analogy": null, "why": "All 6 are left joins — the site table drives the result, so no sites are lost even if a distance file is missing that GTVID. The join key is gtvid (left) to GTVID (right) with case difference between the aggregated data and the distance files.", "details": [{"title": "Pre-aggregation", "body": "Interstate distances are pre-aggregated before joining: some sites are near multiple interstates, so the pipeline takes the minimum distance per site via group_by(GTVID).agg(min(distance)). Walmart and Target distances are computed from raw geodata using the haversine formula in 10K-site chunks to control memory."}], "extra_html": "", "source_function": "join_geospatial_features", "source_file": "site_scoring/data_transform.py", "source_line": 718}, {"id": "log-transforms", "title": "Log Transformations", "step_order": 3, "color": "orange", "sub": "Right-skewed revenue and distance features transformed to normalize distributions", "analogy": "Revenue and distances are like earthquake magnitudes — the difference between $100 and $1,000 matters more than between $100,000 and $101,000. Log compression makes the model treat differences proportionally.", "why": null, "details": [{"title": "Why sign-preserving?", "body": "The formula uses sign(x) × log(1+|x|) for signed types and log(x+1) for unsigned integers. This handles rare negative revenue records without losing sign information. The +1 ensures log(0) does not produce negative infinity."}], "extra_html": "", "source_function": "add_log_transformations", "source_file": "site_scoring/data_transform.py", "source_line": 822}, {"id": "flag-encoding", "title": "Flag Encoding", "step_order": 4, "color": "pink", "sub": "Capability and restriction flags converted from mixed strings to numeric 0/1", "analogy": "The source data is inconsistent — some flags say \"Yes\"/\"No\", others say \"true\"/\"false\", others use actual booleans. This step normalizes all 51 flags so the model sees clean 0/1 values.", "why": "Original string columns are dropped after encoding. ~40 encoded flag columns remain in the final dataset, with suffix _encoded.", "details": [{"title": "Encoding strategy", "body": "Boolean values cast to Int8 (0/1). Yes/No/Unknown strings map to 1/0/null. Ad eligibility true/false strings are lowercased and cast. Multi-category flags get one-hot per category."}], "extra_html": "", "source_function": "one_hot_encode_flags", "source_file": "site_scoring/data_transform.py", "source_line": 880}, {"id": "binning", "title": "High-Cardinality Binning", "step_order": 5, "color": "yellow", "sub": "Retailer and brand names binned to top N + \"Other\" to prevent overfitting", "analogy": "If your model learns that \"Joe's Gas #47\" means high revenue, it is memorizing noise. By grouping rare retailer names into \"Other\", we force the model to learn patterns from major chains while treating one-off names as generic.", "why": null, "details": [{"title": "Top N selection", "body": "Top N is determined by frequency — the most common 30 retailer names are preserved, and all rare retailers are grouped into a single \"Other\" category. brand_fuel uses top 10 since it has fewer unique values."}], "extra_html": "", "source_function": "bin_high_cardinality", "source_file": "site_scoring/data_transform.py", "source_line": 958}, {"id": "training-filter", "title": "Training Set Filtering", "step_order": 6, "color": "red", "sub": "All sites filtered down to active-only, ML-ready rows", "analogy": "Not every gas station belongs in the training data. Deactivated sites would teach the model about failure, not success. Negative revenue records are data errors. Geographic IDs would let the model cheat by memorizing states instead of learning real patterns.", "why": "Geographic columns (state, county, DMA, zip) are dropped rather than filtered. If the model learned that \"Texas\" means high revenue, it would fail on new states. Instead, geographic signal comes through the proximity features (distance to Walmart, etc.) which generalize better.", "details": [{"title": "Three filters", "body": "Active status only (removes ~31,500 deactivated sites). Remove negative revenue (removes ~2 data errors). Drop geographic identifiers (prevents model from memorizing state/county/zip)."}], "extra_html": "", "source_function": "prepare_training_dataset", "source_file": "site_scoring/data_transform.py", "source_line": 999}], "sources": [], "stats_row": [{"value": "57,675", "label": "Pre-cleaned sites", "color": "#22d3ee"}, {"value": "26,096", "label": "Training sites", "color": "#34d399"}, {"value": "114", "label": "Final columns", "color": "#fb923c"}, {"value": "7", "label": "Cleaning steps", "color": "#6366f1"}], "flow_svg": "", "stage_index": 1}, {"id": "combining", "title": "3. Data Combining", "category": "Pipeline Stages", "question": "How do we join data from different sources into one dataset?", "intro": "Data combining is where isolated sources become a <strong>single, unified dataset</strong>. Our pipeline merges temporal data (monthly records into site summaries), momentum features (relative strength trends), and spatial data (6 geographic proximity files) — all keyed on unique site identifiers. The result: one rich row per site with ~102 columns.", "analogy": "Imagine you're building a profile for each of 57,675 gas stations. You start with a giant ledger of monthly reports (1.4M rows) and condense it into one summary card per station. Then you staple on distance measurements — how far is this station from the nearest highway? Walmart? McDonald's? Finally, you add trend arrows showing whether each station is doing better or worse recently. The result is one comprehensive card per station.", "why": "The combining stage uses <strong>two different join keys</strong>: <code>id_gbase</code> for temporal aggregation (collapsing monthly → site-level) and <code>gtvid</code> for geospatial joins (attaching distance files). Both uniquely identify a site, but different source systems use different ID formats. All joins are left joins — preserving every site even when distance data is missing — to avoid silently dropping sites from the training set.", "steps": [{"id": "temporal-aggregation", "title": "Temporal Aggregation (Monthly to Site-Level)", "step_order": 1, "color": "cyan", "sub": "1.4M monthly records collapsed into one row per site via group_by on id_gbase", "analogy": "This is really a vertical combine — collapsing multiple time-series rows into one summary row. We do not lose temporal signal because relative strength features capture momentum trends from the time-series data.", "why": null, "details": [{"title": "Aggregation strategies", "body": "Revenue and traffic metrics use sum totals plus average per month. Site metadata uses the last value (most recent month). Temporal columns count distinct months and track date ranges."}], "extra_html": "", "source_function": "aggregate_site_metrics", "source_file": "site_scoring/data_transform.py", "source_line": 514}, {"id": "rs-features", "title": "Relative Strength Feature Join", "step_order": 2, "color": "pink", "sub": "12 momentum features computed from monthly time-series, joined back onto site rows", "analogy": "Think of momentum indicators in stock trading — is this site trending up or down? We compare recent performance (3 months) against longer windows (6, 12, 24 months) to capture short, medium, and long-term trends.", "why": "RS > 1.0 means trending up (recent average beats historical). RS < 1.0 means trending down. RS = 1.0 is neutral (or insufficient data). Sites need at least 2 months in each window to get a real RS value.", "details": [{"title": "Three time horizons", "body": "Short-term: 95/185 days (3/6 months). Medium-term: 185/370 days (6/12 months). Long-term: 370/740 days (12/24 months). Each horizon produces 4 features (Impressions, NVIs, Revenue, RevenuePerScreen) = 12 RS columns total."}], "extra_html": "", "source_function": "calculate_all_relative_strength_features", "source_file": "site_scoring/data_transform.py", "source_line": 402}, {"id": "geo-joins", "title": "Geospatial Feature Joins (6 Left Joins)", "step_order": 3, "color": "green", "sub": "6 distance CSVs joined sequentially via GTVID — nearest site, interstate, Kroger, McDonald's, Walmart, Target", "analogy": null, "why": "Only selected columns are brought in to avoid polluting the dataset with duplicate lat/lon columns. The join key uses gtvid (left) to GTVID (right) to handle case differences between systems.", "details": [], "extra_html": "", "source_function": "join_geospatial_features", "source_file": "site_scoring/data_transform.py", "source_line": 718}, {"id": "output", "title": "Combined Output: Pre-Cleaned Dataset", "step_order": 4, "color": "orange", "sub": "All sites with all features saved as site_aggregated_precleaned.parquet", "analogy": null, "why": "Column count grows from 94 (raw CSV) to ~102 (precleaned) because aggregation adds computed columns (totals, averages, RS features) and joins add distance columns. It then jumps to ~111 in the training set because log transforms and encoded flags add more columns while geo IDs are dropped.", "details": [], "extra_html": "", "source_function": "transform_data", "source_file": "site_scoring/data_transform.py", "source_line": 1249}], "sources": [], "stats_row": [{"value": "94", "label": "Input columns", "color": "#6366f1"}, {"value": "57,675", "label": "Sites after agg", "color": "#22d3ee"}, {"value": "6", "label": "Left joins", "color": "#34d399"}, {"value": "~104", "label": "Output columns", "color": "#fb923c"}], "flow_svg": "<svg viewBox=\"0 0 640 200\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#0f172a;border-radius:10px;border:1px solid #334155\"><defs><marker id=\"aj\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#34d399\"/></marker><marker id=\"aj2\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#22d3ee\"/></marker><marker id=\"aj3\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#f472b6\"/></marker></defs><text x=\"75\" y=\"16\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"9\" font-weight=\"600\">RAW INPUT</text><rect x=\"10\" y=\"22\" width=\"130\" height=\"44\" rx=\"8\" fill=\"#6366f122\" stroke=\"#6366f1\" stroke-width=\"1.5\"/><text x=\"75\" y=\"40\" text-anchor=\"middle\" fill=\"#6366f1\" font-size=\"8\" font-weight=\"700\">site_scores_revenue_</text><text x=\"75\" y=\"51\" text-anchor=\"middle\" fill=\"#6366f1\" font-size=\"8\" font-weight=\"700\">and_diagnostics.csv</text><text x=\"75\" y=\"62\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">1.4M rows x 94 cols</text><line x1=\"140\" y1=\"44\" x2=\"195\" y2=\"44\" stroke=\"#22d3ee\" stroke-width=\"1.5\" marker-end=\"url(#aj2)\"/><text x=\"280\" y=\"16\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"9\" font-weight=\"600\">AGGREGATED</text><rect x=\"195\" y=\"22\" width=\"170\" height=\"44\" rx=\"8\" fill=\"#22d3ee22\" stroke=\"#22d3ee\" stroke-width=\"1.5\"/><text x=\"280\" y=\"40\" text-anchor=\"middle\" fill=\"#22d3ee\" font-size=\"9\" font-weight=\"700\">57,675 Sites</text><text x=\"280\" y=\"53\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">totals + averages + metadata</text><rect x=\"10\" y=\"86\" width=\"130\" height=\"36\" rx=\"8\" fill=\"#f472b622\" stroke=\"#f472b6\" stroke-width=\"1.5\"/><text x=\"75\" y=\"103\" text-anchor=\"middle\" fill=\"#f472b6\" font-size=\"8\" font-weight=\"700\">RS Features (12 cols)</text><line x1=\"140\" y1=\"104\" x2=\"195\" y2=\"75\" stroke=\"#f472b6\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\" marker-end=\"url(#aj3)\"/><rect x=\"10\" y=\"135\" width=\"130\" height=\"36\" rx=\"8\" fill=\"#34d39922\" stroke=\"#34d399\" stroke-width=\"1.5\"/><text x=\"75\" y=\"152\" text-anchor=\"middle\" fill=\"#34d399\" font-size=\"8\" font-weight=\"700\">6 Proximity CSVs</text><line x1=\"140\" y1=\"153\" x2=\"278\" y2=\"70\" stroke=\"#34d399\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\" marker-end=\"url(#aj)\"/><line x1=\"365\" y1=\"44\" x2=\"425\" y2=\"44\" stroke=\"#fb923c\" stroke-width=\"2\" marker-end=\"url(#aj)\"/><rect x=\"425\" y=\"18\" width=\"200\" height=\"52\" rx=\"10\" fill=\"#fb923c22\" stroke=\"#fb923c\" stroke-width=\"2\"/><text x=\"525\" y=\"38\" text-anchor=\"middle\" fill=\"#fb923c\" font-size=\"10\" font-weight=\"700\">Pre-Cleaned Dataset</text><text x=\"525\" y=\"51\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"8\">57,675 rows x ~104 cols</text></svg>", "stage_index": 2}, {"id": "modeling", "title": "4. Modeling", "category": "Pipeline Stages", "question": "How do we train the model to make predictions?", "intro": "The modeling stage takes our cleaned, combined dataset and trains a machine learning model to predict site revenue or classify top-performing sites. The pipeline supports two model architectures: a <strong>PyTorch neural network</strong> with residual connections and a <strong>gradient-boosted tree model</strong> via XGBoost. Both share the same data loading and feature processing pipeline.", "analogy": "Think of model training like teaching someone to appraise gas stations. You show them thousands of examples with known values (training data), quiz them on examples they have not seen (validation), and finally test them on a completely held-out set (test). The model learns which features — proximity to Walmart, monthly impression trends, demographic patterns — matter most for predicting revenue.", "why": "Every training run produces a self-contained experiment folder with config, model weights, preprocessor state, and evaluation results. This makes any experiment reproducible — you can reload and score new sites months later using the exact same feature processing.", "steps": [{"id": "data-loading", "title": "Data Loading & Splitting", "step_order": 0, "color": "accent", "sub": "Load parquet, filter by network and history, split 70/15/15 into train/val/test", "analogy": "Before training begins, we prepare the data like a teacher preparing an exam. The full dataset is loaded, then split into three non-overlapping sets. The model only ever trains on 70% of the data.", "why": null, "details": [{"title": "History filter", "body": "Only sites with 12+ months of history (active_months > 11) are included. This ensures enough temporal data for stable feature values and prevents noisy short-lived sites from polluting the model."}], "extra_html": "", "source_function": "run_training_logic", "source_file": "src/services/training_service.py", "source_line": 1476}, {"id": "feature-processing", "title": "Feature Processing", "step_order": 1, "color": "cyan", "sub": "Numeric scaling, categorical encoding, boolean conversion, and target preparation", "analogy": "Raw features come in different formats: numbers at various scales, text categories, and yes/no flags. Feature processing standardizes everything so the model sees consistent input. StandardScaler centers numeric features around zero. LabelEncoder maps categories to integers. Booleans become 0.0/1.0 floats.", "why": "Feature processing state (fitted scalers, encoders, vocab sizes) is saved in preprocessor.pkl alongside the model. This ensures inference uses the exact same transformations as training — a critical requirement for consistent predictions.", "details": [{"title": "Percentile clipping", "body": "Numeric features are clipped to the 1st and 99th percentiles before scaling. This prevents extreme outliers from dominating the StandardScaler fit, which would compress the useful range of normal values."}], "extra_html": "", "source_function": "DataProcessor", "source_file": "site_scoring/data_loader.py", "source_line": 47}, {"id": "target-prep", "title": "Target Preparation", "step_order": 2, "color": "green", "sub": "Revenue scaled for regression, or binarized by percentile threshold for classification", "analogy": "For regression, the model predicts normalized revenue (the scaler is saved so we can convert back to real dollars later). For classification (lookalike), sites above the chosen percentile threshold are labeled 1 (top performer), all others 0.", "why": "The lookalike threshold is configurable from the UI: percentile mode (e.g., p90 = top 10%) or standard deviation mode (e.g., mean + 1 sigma). Only active sites contribute to the percentile calculation, preventing deactivated sites from skewing the threshold.", "details": [], "extra_html": "", "source_function": "_process_target", "source_file": "site_scoring/data_loader.py", "source_line": 228}, {"id": "architecture", "title": "Neural Network Architecture", "step_order": 3, "color": "accentLt", "sub": "Categorical embeddings + BatchNorm + Residual MLP with configurable hidden dimensions", "analogy": "The model processes three types of input differently: categorical features get learned dense representations (embeddings), numeric features get standardized (BatchNorm), and boolean features pass through directly. All three streams concatenate into a single vector that flows through residual MLP blocks — each block adds its learned transformation to the input, making training more stable.", "why": "Residual connections (skip connections) allow gradients to flow more easily through deep networks. Each ResidualBlock applies Linear → BatchNorm → ReLU → Linear → BatchNorm, then adds the original input. A projection layer handles dimension mismatches between blocks.", "details": [{"title": "Architecture dimensions", "body": "Default hidden dims are [512, 256, 128, 64] with dropout=0.2. The final output is Linear(64, 1) producing a single scalar prediction. For classification, sigmoid is applied during inference (not during training, which uses BCEWithLogitsLoss)."}], "extra_html": "", "source_function": "SiteScoringModel", "source_file": "site_scoring/model.py", "source_line": 96}, {"id": "xgboost", "title": "XGBoost Alternative", "step_order": 4, "color": "green", "sub": "Gradient-boosted decision trees via XGBoost, faster training with comparable accuracy", "analogy": "While the neural network learns complex non-linear patterns through deep layers, XGBoost builds an ensemble of simple decision trees. Each tree corrects the mistakes of the previous ones. It trains much faster and often matches neural network performance on tabular data.", "why": "XGBoost uses the sklearn API with callbacks for progress reporting. For classification, it uses binary:logistic objective. For regression, it uses reg:squarederror. The model is saved as model_wrapper.pkl via pickle serialization.", "details": [], "extra_html": "", "source_function": "_run_tree_training", "source_file": "src/services/training_service.py", "source_line": 495}, {"id": "training-loop", "title": "Training Loop", "step_order": 5, "color": "orange", "sub": "Forward pass, loss computation, backpropagation, gradient clipping, early stopping", "analogy": "Each epoch is one complete pass through the training data. The model makes predictions, measures how wrong it was (loss), and adjusts its weights to do better next time. Early stopping watches the validation loss and stops when the model starts memorizing instead of learning.", "why": "Training uses AdamW optimizer with weight decay regularization. Learning rate is reduced by half when validation loss plateaus (ReduceLROnPlateau). Gradient clipping at max_norm=1.0 prevents exploding gradients. Progress streams to the UI via Server-Sent Events (SSE).", "details": [{"title": "Loss functions", "body": "Regression uses HuberLoss(delta=1.0) which is robust to outliers. Classification uses BCEWithLogitsLoss with pos_weight=9.0 to handle class imbalance (typically only 10% of sites are top performers)."}], "extra_html": "", "source_function": "run_training_logic", "source_file": "src/services/training_service.py", "source_line": 1476}, {"id": "artifacts", "title": "Experiment Artifacts", "step_order": 6, "color": "pink", "sub": "Model checkpoint, preprocessor state, config, and metadata saved to experiment folder", "analogy": null, "why": "Each experiment writes to site_scoring/outputs/experiments/job_xxx/ with a maximum of 10 experiments (FIFO cleanup). The folder contains everything needed to reconstruct the model for inference: config.json, best_model.pt (or model_wrapper.pkl for XGBoost), preprocessor.pkl, and model_metadata.json with test metrics.", "details": [], "extra_html": "", "source_function": "run_training_logic", "source_file": "src/services/training_service.py", "source_line": 1476}], "sources": [], "stats_row": [{"value": "16", "label": "Numeric features", "color": "#6366f1"}, {"value": "7", "label": "Categorical", "color": "#22d3ee"}, {"value": "33", "label": "Boolean", "color": "#34d399"}, {"value": "512→256→128→64", "label": "Hidden dims", "color": "#fb923c"}], "flow_svg": "<svg viewBox=\"0 0 640 150\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#0f172a;border-radius:10px;border:1px solid #334155\"><defs><marker id=\"am\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#818cf8\"/></marker></defs><text x=\"60\" y=\"16\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"9\" font-weight=\"600\">INPUT FEATURES</text><rect x=\"10\" y=\"22\" width=\"100\" height=\"28\" rx=\"6\" fill=\"#6366f122\" stroke=\"#6366f1\" stroke-width=\"1\"/><text x=\"60\" y=\"40\" text-anchor=\"middle\" fill=\"#6366f1\" font-size=\"8\" font-weight=\"600\">Numeric (16)</text><rect x=\"10\" y=\"56\" width=\"100\" height=\"28\" rx=\"6\" fill=\"#22d3ee22\" stroke=\"#22d3ee\" stroke-width=\"1\"/><text x=\"60\" y=\"74\" text-anchor=\"middle\" fill=\"#22d3ee\" font-size=\"8\" font-weight=\"600\">Categorical (7)</text><rect x=\"10\" y=\"90\" width=\"100\" height=\"28\" rx=\"6\" fill=\"#34d39922\" stroke=\"#34d399\" stroke-width=\"1\"/><text x=\"60\" y=\"108\" text-anchor=\"middle\" fill=\"#34d399\" font-size=\"8\" font-weight=\"600\">Boolean (33)</text><text x=\"200\" y=\"16\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"9\" font-weight=\"600\">PROCESSING</text><rect x=\"130\" y=\"22\" width=\"140\" height=\"28\" rx=\"6\" fill=\"#6366f122\" stroke=\"#6366f1\" stroke-width=\"1\"/><text x=\"200\" y=\"40\" text-anchor=\"middle\" fill=\"#6366f1\" font-size=\"8\">StandardScaler</text><rect x=\"130\" y=\"56\" width=\"140\" height=\"28\" rx=\"6\" fill=\"#22d3ee22\" stroke=\"#22d3ee\" stroke-width=\"1\"/><text x=\"200\" y=\"74\" text-anchor=\"middle\" fill=\"#22d3ee\" font-size=\"8\">Embedding (dim=16)</text><rect x=\"130\" y=\"90\" width=\"140\" height=\"28\" rx=\"6\" fill=\"#34d39922\" stroke=\"#34d399\" stroke-width=\"1\"/><text x=\"200\" y=\"108\" text-anchor=\"middle\" fill=\"#34d399\" font-size=\"8\">Cast to Float</text><line x1=\"270\" y1=\"70\" x2=\"300\" y2=\"70\" stroke=\"#818cf8\" stroke-width=\"1.5\" marker-end=\"url(#am)\"/><rect x=\"300\" y=\"40\" width=\"140\" height=\"56\" rx=\"10\" fill=\"#818cf822\" stroke=\"#818cf8\" stroke-width=\"2\"/><text x=\"370\" y=\"60\" text-anchor=\"middle\" fill=\"#818cf8\" font-size=\"9\" font-weight=\"700\">Residual MLP</text><text x=\"370\" y=\"74\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">512 → 256 → 128 → 64</text><text x=\"370\" y=\"86\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">BatchNorm + Dropout</text><line x1=\"440\" y1=\"68\" x2=\"470\" y2=\"68\" stroke=\"#818cf8\" stroke-width=\"1.5\" marker-end=\"url(#am)\"/><rect x=\"470\" y=\"48\" width=\"100\" height=\"40\" rx=\"8\" fill=\"#fb923c22\" stroke=\"#fb923c\" stroke-width=\"1.5\"/><text x=\"520\" y=\"65\" text-anchor=\"middle\" fill=\"#fb923c\" font-size=\"9\" font-weight=\"700\">Output</text><text x=\"520\" y=\"78\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">Linear(64, 1)</text><text x=\"370\" y=\"130\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"8\">56 total features → 1 prediction</text></svg>", "stage_index": 3}, {"id": "testing", "title": "5. Testing & Validation", "category": "Pipeline Stages", "question": "How do we know the model actually works?", "intro": "Testing and validation ensure the model generalizes beyond its training data. We use a <strong>three-way data split</strong> (train/validation/test) where each set serves a distinct purpose. The validation set tunes hyperparameters and stops training early. The test set provides a single, unbiased evaluation that was never seen during training or tuning.", "analogy": "Imagine grading a student. The training set is like homework — the student learns from it. The validation set is like practice exams — the teacher adjusts the curriculum based on results. The test set is the final exam — it is taken once, never reviewed during the course, and gives the true measure of what was learned.", "why": "A critical lesson from this project: <strong>never report validation metrics as test metrics</strong>. Validation loss influences early stopping, so it is optimistically biased. The test set must be evaluated exactly once, after loading the best model, to get unbiased final metrics.", "steps": [{"id": "split-philosophy", "title": "Train/Val/Test Split Philosophy", "step_order": 0, "color": "yellow", "sub": "Three non-overlapping splits, each with one job — learn, tune, judge", "analogy": "Three splits, three jobs. The training set is the textbook the model studies. The validation set is the practice quiz the teacher grades after every chapter to decide what to teach next. The test set is the sealed final exam — opened once, after all studying is done, to give the only honest grade.", "why": "We split 70/15/15 into train, validation, and test before any learning happens. Validation loss drives early stopping and learning rate scheduling, so it is optimistically biased — the model has, indirectly, seen it. The test set is touched exactly once at the very end, after the best model is reloaded from checkpoint. This is why the project rule is absolute: <strong>never report validation metrics as test metrics</strong>. Doing so reports the practice-quiz score as the final-exam grade, and silently overstates how well the model generalizes to sites it has never seen.", "details": [{"title": "Why three splits, not two?", "body": "A train/test split alone forces an impossible choice — either tune on the test set (and lose your unbiased estimate) or never tune at all. The validation set absorbs the bias from tuning so the test set can stay clean."}], "extra_html": "", "source_function": "run_training_logic", "source_file": "src/services/training_service.py", "source_line": 1476}, {"id": "validation", "title": "Validation During Training", "step_order": 1, "color": "cyan", "sub": "Per-epoch validation metrics, early stopping patience, learning rate scheduling", "analogy": null, "why": "Validation runs after every training epoch with no gradient computation (torch.no_grad). If validation loss does not improve for early_stopping_patience epochs, training stops and the best model state is restored. The learning rate scheduler also watches validation loss and reduces LR when it plateaus.", "details": [], "extra_html": "", "source_function": "run_training_logic", "source_file": "src/services/training_service.py", "source_line": 1476}, {"id": "test-evaluation", "title": "Test Set Evaluation", "step_order": 2, "color": "green", "sub": "Load best model, score held-out test set, compute final unbiased metrics", "analogy": "This is the final exam. After loading the best model (chosen by validation performance), we score the held-out test set that was never used during training or hyperparameter tuning. Predictions are inverse-transformed back to original dollar scale before computing metrics.", "why": "For regression, predictions are inverse-transformed using the saved StandardScaler to convert from normalized space back to real dollar values. This ensures metrics like MAE and RMSE are in interpretable units, not scaled space.", "details": [{"title": "Test vs validation", "body": "The test set was never seen during training. Validation metrics are optimistically biased because validation loss influenced early stopping and learning rate scheduling. Test metrics are the only honest measure of generalization."}], "extra_html": "", "source_function": "run_training_logic", "source_file": "src/services/training_service.py", "source_line": 1476}, {"id": "regression-metrics", "title": "Regression Metrics", "step_order": 3, "color": "orange", "sub": "MAE, RMSE, R-squared, MAPE, SMAPE computed on the held-out test set", "analogy": "Each metric tells a different story. MAE is the average dollar error. RMSE penalizes large errors more heavily. R-squared measures how much variance the model explains (1.0 = perfect). MAPE gives percentage error but fails when actuals are near zero.", "why": null, "details": [{"title": "Which to trust", "body": "R-squared is the best single summary metric for regression. MAE is most interpretable (average error in dollars). MAPE is useful for relative comparison but can be misleading for low-revenue sites. SMAPE handles zero actuals better than MAPE."}], "extra_html": "", "source_function": "_process_target", "source_file": "site_scoring/data_loader.py", "source_line": 228}, {"id": "classification-metrics", "title": "Classification Metrics", "step_order": 4, "color": "pink", "sub": "AUC-ROC, F1, Log Loss, accuracy for lookalike classification", "analogy": "AUC-ROC measures how well the model separates top performers from non-performers across all possible thresholds. F1 balances precision (how many flagged sites are actually top performers) with recall (how many top performers were flagged). Log Loss penalizes confident wrong predictions.", "why": null, "details": [{"title": "Class imbalance", "body": "With default p90 threshold, only ~10% of sites are positive. The model uses pos_weight=9.0 in BCEWithLogitsLoss to compensate, effectively upweighting the minority class during training."}], "extra_html": "", "source_function": "_process_target", "source_file": "site_scoring/data_loader.py", "source_line": 228}, {"id": "shap", "title": "SHAP Feature Importance", "step_order": 5, "color": "accent", "sub": "Compute SHAP values on test set to explain which features drive predictions", "analogy": null, "why": "SHAP (SHapley Additive exPlanations) uses 100 background samples and explains 200 test samples. The top 20 features by mean absolute SHAP value are saved to shap_importance.json. This provides interpretable, per-feature contribution scores.", "details": [], "extra_html": "", "source_function": "run_training_logic", "source_file": "src/services/training_service.py", "source_line": 1476}, {"id": "classification-exports", "title": "Classification Exports", "step_order": 6, "color": "orange", "sub": "Export training labels, test predictions, and non-active site scores to CSV", "analogy": null, "why": "Three CSV files are produced: training_sites.csv (all training split sites with labels), test_predictions.csv (test split with predicted probabilities), and non_active_classification.csv (non-Active sites scored by the model, top 5000 flagged). These enable downstream analysis of model performance and prospect identification.", "details": [], "extra_html": "", "source_function": "_export_classification_results", "source_file": "src/services/training_service.py", "source_line": 960}], "sources": [], "stats_row": [{"value": "70/15/15", "label": "Train/Val/Test", "color": "#6366f1"}, {"value": "3", "label": "Split sets", "color": "#22d3ee"}, {"value": "SHAP", "label": "Explainability", "color": "#34d399"}, {"value": "10", "label": "Experiments", "color": "#fb923c"}], "flow_svg": "<svg viewBox=\"0 0 640 95\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#0f172a;border-radius:10px;border:1px solid #334155\"><text x=\"320\" y=\"16\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"9\" font-weight=\"600\">DATA SPLIT STRATEGY</text><rect x=\"20\" y=\"28\" width=\"392.0\" height=\"30\" rx=\"6\" fill=\"#6366f144\" stroke=\"#6366f1\" stroke-width=\"1.5\"/><text x=\"216.0\" y=\"47\" text-anchor=\"middle\" fill=\"#6366f1\" font-size=\"10\" font-weight=\"700\">Train (70%)</text><rect x=\"416.0\" y=\"28\" width=\"84.0\" height=\"30\" rx=\"6\" fill=\"#22d3ee44\" stroke=\"#22d3ee\" stroke-width=\"1.5\"/><text x=\"458.0\" y=\"47\" text-anchor=\"middle\" fill=\"#22d3ee\" font-size=\"10\" font-weight=\"700\">Val (15%)</text><rect x=\"503.99999999999994\" y=\"28\" width=\"84.0\" height=\"30\" rx=\"6\" fill=\"#34d39944\" stroke=\"#34d399\" stroke-width=\"1.5\"/><text x=\"546.0\" y=\"47\" text-anchor=\"middle\" fill=\"#34d399\" font-size=\"10\" font-weight=\"700\">Test (15%)</text><text x=\"20\" y=\"78\" fill=\"#6366f1\" font-size=\"8\">Trains the model</text><text x=\"416.0\" y=\"78\" fill=\"#22d3ee\" font-size=\"8\">Tunes + early stop</text><text x=\"503.99999999999994\" y=\"78\" fill=\"#34d399\" font-size=\"8\">Final unbiased eval</text></svg>", "stage_index": 4}, {"id": "productionizing", "title": "6. Productionizing", "category": "Pipeline Stages", "question": "How do we deploy the model and keep it running reliably?", "intro": "Productionizing turns a trained experiment into a live scoring system. The <strong>BatchPredictor</strong> class loads any experiment folder, reconstructs the model (neural network or XGBoost), processes new site data using the saved preprocessor, and produces predictions for all sites in the network. Results can be filtered, ranked, and exported as CSV or Excel for sales teams.", "analogy": "Training is like building a recipe. Productionizing is like opening the restaurant. The recipe (model weights) and preparation techniques (preprocessor) were perfected during training. Now we apply them at scale to every site in the network, serving predictions on demand through API endpoints.", "why": "The inference pipeline reuses the exact same feature processing as training — same scalers, same encoders, same column order. This is guaranteed by loading preprocessor.pkl from the experiment folder. A module-level cache prevents reloading the model on every API request.", "steps": [{"id": "experiment-discovery", "title": "Experiment Discovery", "step_order": 0, "color": "accent", "sub": "Find the most recent valid experiment by modification time and artifact validation", "analogy": "Before scoring sites, we need to pick which trained model to use. The system sorts experiment folders by modification time (newest first) and validates each one has the required artifacts: config.json, preprocessor.pkl, and either best_model.pt or model_wrapper.pkl.", "why": "An experiment is only valid if it has all three artifact types. Partially-saved experiments (e.g., training was interrupted) are skipped automatically.", "details": [], "extra_html": "", "source_function": "_find_latest_experiment", "source_file": "src/routes/prediction.py", "source_line": 17}, {"id": "model-loading", "title": "Model Loading", "step_order": 1, "color": "cyan", "sub": "Load config, preprocessor (scalers + encoders), and reconstruct the model in eval mode", "analogy": "Loading a model is like reopening a recipe book. We read the config to know what kind of model it is, load the preprocessor to know how ingredients were prepared, then reconstruct the model architecture and load the trained weights. The model is set to evaluation mode (no dropout, frozen BatchNorm).", "why": "For neural networks, the model is reconstructed from the saved config (architecture dimensions) and weights (state_dict). For XGBoost, the pickled model wrapper is loaded directly. A cached predictor avoids reloading on every API request — the cache invalidates only when the experiment directory changes.", "details": [], "extra_html": "", "source_function": "BatchPredictor", "source_file": "site_scoring/predict.py", "source_line": 200}, {"id": "inference-data-prep", "title": "Inference Data Preparation", "step_order": 2, "color": "yellow", "sub": "Load precleaned parquet (all statuses) and apply the same training transforms without the active-only filter", "analogy": "Training learned the recipe from a curated subset of sites (Active, 12+ months of history). Inference needs to score every site in the network — including Deactivated, Awaiting Installation, and Cancelled ones — so we re-open the full precleaned parquet and run it through the exact same prep steps the model expects.", "why": "Calling prepare_training_dataset(active_only=False, drop_geo_ids=True) guarantees train/inference parity: the same log transforms, one-hot encoding, and binning that shaped the training feature space are applied to every site we score. The fitted preprocessor (scalers and label encoders, loaded by BatchPredictor) then takes over for the numeric/categorical/boolean transforms downstream. Skipping any of these steps would silently shift the input distribution and degrade predictions.", "details": [{"title": "Module-level cache", "body": "A module-global _prediction_data_cache holds the prepared DataFrame after the first call. Subsequent requests return the cached frame in O(1) instead of re-reading the ~25MB parquet and recomputing derived features. The cache lives for the process lifetime — restarting the Flask app rebuilds it."}], "extra_html": "", "source_function": "get_all_sites_for_prediction", "source_file": "site_scoring/data_transform.py", "source_line": 1360}, {"id": "batch-prediction", "title": "Batch Prediction", "step_order": 3, "color": "green", "sub": "Process features, route to XGBoost or neural network, return {gtvid: score} mapping", "analogy": "Scoring works like an assembly line. Each site's raw features are processed through three parallel paths (numeric scaling, categorical encoding, boolean conversion), concatenated, and fed through the model. Neural networks process in batches of 4,096 for memory efficiency.", "why": "Feature processing uses the fitted scaler and label_encoders from training. Unknown categories (new values not seen during training) map to index 0, which acts as a safe default. For regression, predictions are inverse-transformed back to original dollar scale.", "details": [{"title": "XGBoost vs NN inference", "body": "XGBoost concatenates all features into one array and calls predict() directly. Neural networks batch-process through the model on the available device (MPS on Apple Silicon, CPU otherwise). Classification applies sigmoid to raw logits; regression inverse-transforms scaled predictions."}], "extra_html": "", "source_function": "predict", "source_file": "site_scoring/predict.py", "source_line": 264}, {"id": "filtered-scoring", "title": "Filtered Scoring", "step_order": 4, "color": "orange", "sub": "Apply map filter state (network, state, status) to score a subset of sites", "analogy": "Instead of scoring all 57,000 sites, filtered scoring lets users focus on what they care about. \"Show me just the Wayne network sites in Texas\" scores only that subset, returning results with summary statistics in under 2 seconds.", "why": "Filters support multi-select on network, state, and status, plus min/max revenue bounds and explicit gtvid lists. The filter is applied to the prediction DataFrame before scoring, not after, for efficiency.", "details": [], "extra_html": "", "source_function": "api_predict_filtered", "source_file": "src/routes/prediction.py", "source_line": 267}, {"id": "export", "title": "Export Pipeline", "step_order": 5, "color": "pink", "sub": "Join predictions with site metadata, compute rank and percentile, export as CSV or XLSX", "analogy": null, "why": "Predictions are joined with site metadata (name, city, state, network, status) from the precleaned parquet. Rank is computed as dense rank by score (1 = highest). Percentile uses percentile of score. Export files include experiment_id and scored_at timestamp for traceability.", "details": [], "extra_html": "", "source_function": "predict_with_metadata", "source_file": "site_scoring/predict.py", "source_line": 311}], "sources": [], "stats_row": [{"value": "57,675", "label": "Scoreable sites", "color": "#6366f1"}, {"value": "10", "label": "Trained models", "color": "#22d3ee"}, {"value": "4096", "label": "Batch size", "color": "#34d399"}, {"value": "CSV/XLSX", "label": "Export formats", "color": "#fb923c"}], "flow_svg": "<svg viewBox=\"0 0 640 110\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#0f172a;border-radius:10px;border:1px solid #334155\"><defs><marker id=\"ap\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#818cf8\"/></marker></defs><rect x=\"10\" y=\"25\" width=\"100\" height=\"50\" rx=\"8\" fill=\"#6366f122\" stroke=\"#6366f1\" stroke-width=\"1.5\"/><text x=\"60\" y=\"45\" text-anchor=\"middle\" fill=\"#6366f1\" font-size=\"8\" font-weight=\"700\">Experiment</text><text x=\"60\" y=\"58\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">10 available</text><line x1=\"110\" y1=\"50\" x2=\"135\" y2=\"50\" stroke=\"#818cf8\" stroke-width=\"1.5\" marker-end=\"url(#ap)\"/><rect x=\"135\" y=\"25\" width=\"110\" height=\"50\" rx=\"8\" fill=\"#22d3ee22\" stroke=\"#22d3ee\" stroke-width=\"1.5\"/><text x=\"190\" y=\"45\" text-anchor=\"middle\" fill=\"#22d3ee\" font-size=\"8\" font-weight=\"700\">BatchPredictor</text><text x=\"190\" y=\"58\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">Load + reconstruct</text><line x1=\"245\" y1=\"50\" x2=\"270\" y2=\"50\" stroke=\"#818cf8\" stroke-width=\"1.5\" marker-end=\"url(#ap)\"/><rect x=\"270\" y=\"25\" width=\"110\" height=\"50\" rx=\"8\" fill=\"#34d39922\" stroke=\"#34d399\" stroke-width=\"1.5\"/><text x=\"325\" y=\"45\" text-anchor=\"middle\" fill=\"#34d399\" font-size=\"8\" font-weight=\"700\">Score Sites</text><text x=\"325\" y=\"58\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">57,675 sites</text><line x1=\"380\" y1=\"50\" x2=\"405\" y2=\"50\" stroke=\"#818cf8\" stroke-width=\"1.5\" marker-end=\"url(#ap)\"/><rect x=\"405\" y=\"25\" width=\"100\" height=\"50\" rx=\"8\" fill=\"#fb923c22\" stroke=\"#fb923c\" stroke-width=\"1.5\"/><text x=\"455\" y=\"45\" text-anchor=\"middle\" fill=\"#fb923c\" font-size=\"8\" font-weight=\"700\">Results</text><text x=\"455\" y=\"58\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">rank + percentile</text><line x1=\"505\" y1=\"50\" x2=\"530\" y2=\"50\" stroke=\"#818cf8\" stroke-width=\"1.5\" marker-end=\"url(#ap)\"/><rect x=\"530\" y=\"25\" width=\"90\" height=\"50\" rx=\"8\" fill=\"#f472b622\" stroke=\"#f472b6\" stroke-width=\"1.5\"/><text x=\"575\" y=\"45\" text-anchor=\"middle\" fill=\"#f472b6\" font-size=\"8\" font-weight=\"700\">Export</text><text x=\"575\" y=\"58\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"7\">CSV / XLSX</text></svg>", "stage_index": 5}];
const C={accent:"#6366f1",accentLt:"#818cf8",green:"#34d399",orange:"#fb923c",pink:"#f472b6",cyan:"#22d3ee",yellow:"#facc15",red:"#f87171",border:"#334155",surface:"#1e293b",dim:"#64748b",muted:"#94a3b8",bg:"#0f172a",text:"#e2e8f0"};
const colorMap={accent:C.accent,accentLt:C.accentLt,cyan:C.cyan,green:C.green,orange:C.orange,pink:C.pink,yellow:C.yellow,red:C.red};
function analogyHTML(t){return`<div class="analogy-box"><div class="box-label">Plain-language analogy</div><div class="box-body">${t}</div></div>`;}
function whyHTML(t,title){return`<div class="why-box"><div class="box-label">${title||"How this works in our pipeline"}</div><div class="box-body">${t}</div></div>`;}
function detailHTML(t,title){return`<div class="detail-box"><div class="box-label">${title||"Key detail"}</div><div class="box-body">${t}</div></div>`;}
function renderStatsRow(stats){if(!stats||!stats.length)return'';return`<div class="stats-row">${stats.map(s=>`<div class="stat-card"><div class="stat-val" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('')}</div>`;}
function renderSourceCards(sources,stageId){let h=`<div class="source-grid" id="${stageId}-sources">`;sources.forEach(s=>{h+=`<div class="source-card" data-src="${s.id}"><div class="source-icon">${s.icon}</div><div class="source-name">${s.name}</div><div class="source-desc">${s.desc}</div><div class="source-meta"><span>${s.format}</span><span>${s.rows} rows</span><span>${s.cols} cols</span></div></div>`;});h+=`</div>`;return h;}
function renderStepCards(steps,stageId){let h=`<div id="${stageId}-steps">`;steps.forEach(step=>{const c=colorMap[step.color]||C.accent;let det='';if(step.analogy)det+=analogyHTML(step.analogy);if(step.extra_html)det+=step.extra_html;if(step.details)step.details.forEach(d=>{det+=detailHTML(d.body,d.title);});if(step.why)det+=whyHTML(step.why);if(step.source_function)det+=`<div class="src-ref">\u2192 ${step.source_function}() \u2014 ${step.source_file}:${step.source_line}</div>`;h+=`<div class="step-card" data-step="${step.step_order}"><div style="display:flex;align-items:center"><span class="step-num" style="background:${c}22;color:${c}">${step.step_order}</span><span class="step-title" style="color:${c}">${step.title}</span></div><div class="step-sub">${step.sub}</div><div class="step-detail">${det}</div></div>`;});h+=`</div>`;return h;}
function renderStageContent(stage){let h='';if(stage.intro)h+=`<p class="etext">${stage.intro}</p>`;if(stage.analogy)h+=analogyHTML(stage.analogy);if(stage.flow_svg)h+=`<div class="flow-wrap">${stage.flow_svg}</div>`;h+=renderStatsRow(stage.stats_row);if(stage.sources&&stage.sources.length>0){h+=`<p class="cap" style="margin-top:20px">Click a source to explore its fields, sample data, and collection details:</p>`;h+=renderSourceCards(stage.sources,stage.id);h+=`<div class="source-detail" id="source-detail-${stage.id}"></div>`;}if(stage.steps&&stage.steps.length>0){h+=`<p class="cap" style="margin-top:20px">Click each step to expand the details:</p>`;h+=renderStepCards(stage.steps,stage.id);}if((!stage.steps||!stage.steps.length)&&(!stage.sources||!stage.sources.length)&&!stage.intro){h+=`<div class="placeholder"><div class="placeholder-icon">\ud83d\udccb</div><div class="placeholder-text">The <strong>${stage.title}</strong> entry needs <code>@glossary</code> docstrings.<br>Run <code>python scripts/generate_glossary.py --check</code> to see what\u2019s missing.</div></div>`;}if(stage.why)h+=whyHTML(stage.why);return h;}
function initStage(stage){const sc=document.getElementById(stage.id+'-steps');if(sc){sc.querySelectorAll('.step-card').forEach(card=>{card.addEventListener('click',()=>{const w=card.classList.contains('open');sc.querySelectorAll('.step-card').forEach(c=>c.classList.remove('open'));if(!w)card.classList.add('open');});});}const sr=document.getElementById(stage.id+'-sources');if(sr&&stage.sources){sr.querySelectorAll('.source-card').forEach(card=>{card.addEventListener('click',()=>{const s=stage.sources.find(d=>d.id===card.dataset.src);if(!s)return;sr.querySelectorAll('.source-card').forEach(c=>c.classList.remove('active'));card.classList.add('active');const det=document.getElementById('source-detail-'+stage.id);const cc=colorMap[s.color]||C.accent;det.innerHTML=`<div class="detail-header" style="color:${cc}">${s.icon} ${s.name}</div><div class="detail-section"><h4>Key Fields</h4><div style="display:flex;flex-wrap:wrap;gap:6px">${s.fields.map(f=>`<code>${f}</code>`).join('')}</div></div><div class="detail-section"><h4>Sample Rows</h4><div class="sample-wrap"><table class="sample-table"><thead><tr>${s.fields.map(f=>`<th>${f}</th>`).join('')}</tr></thead><tbody>${s.sample.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div><div class="detail-section"><h4>Notes</h4><p style="font-size:13px;line-height:1.6">${s.notes}</p></div>`;det.classList.add('visible');});});}}
const ENTRIES=STAGE_DATA.map(stage=>({id:stage.id,title:stage.title,category:stage.category,question:stage.question,entry:{render(){return renderStageContent(stage);},init(){initStage(stage);}},stage:stage.stage_index}));
let activeId=ENTRIES[0].id;
const stageLabels=["Collect","Clean","Combine","Model","Test","Deploy"];
const stageColors=[C.accent,C.cyan,C.green,C.orange,C.pink,C.accentLt];
function renderPipelineViz(){const a=ENTRIES.find(e=>e.id===activeId);const as=a?a.stage:0;let h='<div class="pipeline-progress">';stageLabels.forEach((l,i)=>{const ds=i<as?`background:${C.green};border-color:${C.green}`:i===as?`background:${stageColors[i]};border-color:${stageColors[i]};box-shadow:0 0 6px ${stageColors[i]}44`:"";h+=`<div class="pip-step" style="${i===as?"color:"+C.text+";font-weight:600":""}"><div class="pip-dot" style="${ds}"></div>${l}</div>`;if(i<5)h+=`<div class="pip-line" style="${i<as?`background:${C.green}`:""}"></div>`;});h+='</div>';document.getElementById("pipeline-viz").innerHTML=h;}
function renderNav(){document.getElementById("count-label").textContent=`Interactive reference \u00b7 ${ENTRIES.length} stages`;const cats=[...new Set(ENTRIES.map(e=>e.category))];let h="";cats.forEach(cat=>{h+=`<div class="cat-label">${cat}</div>`;ENTRIES.filter(e=>e.category===cat).forEach(e=>{h+=`<button class="nav-btn${e.id===activeId?" active":""}" data-id="${e.id}">${e.title}</button>`;});});document.getElementById("nav-list").innerHTML=h;document.querySelectorAll(".nav-btn").forEach(b=>{b.addEventListener("click",()=>{activeId=b.dataset.id;renderPipelineViz();renderNav();showEntry();});});}
function showEntry(){const e=ENTRIES.find(e=>e.id===activeId);document.getElementById("ep").innerHTML=`<span class="pill">${e.category}</span>`;document.getElementById("entry-title").textContent=e.title;document.getElementById("entry-question").textContent=e.question;document.getElementById("ec").innerHTML=e.entry.render();if(e.entry.init)e.entry.init();}
renderPipelineViz();renderNav();showEntry();
</script>
